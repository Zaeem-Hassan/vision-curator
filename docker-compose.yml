version: "3.9"

services:
  # ────────────────────────────────────────────────────────────────────
  # Backend API
  # ────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://vc:vc_password@postgres:5432/visioncurator
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DEVICE=cpu
      - DEBUG=false
    volumes:
      - upload_data:/app/data/uploads
      - faiss_data:/app/data/faiss_indices
      - embeddings_data:/app/data/embeddings_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Celery Worker
  # ────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    command: celery -A app.services.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://vc:vc_password@postgres:5432/visioncurator
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DEVICE=cpu
    volumes:
      - upload_data:/app/data/uploads
      - faiss_data:/app/data/faiss_indices
      - embeddings_data:/app/data/embeddings_cache
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Frontend
  # ────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=vc
      - POSTGRES_PASSWORD=vc_password
      - POSTGRES_DB=visioncurator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vc"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # Redis
  # ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────
  # MinIO (S3-compatible storage)
  # ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:
  faiss_data:
  embeddings_data:
  minio_data:
